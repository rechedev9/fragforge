# Full local app stack: the Next.js web UI + the Go orchestrator, in memory mode
# (in-memory job repo + inline queue, so no Postgres/Redis are needed).
#
#   docker compose -f docker-compose.app.yml up --build
#   open http://localhost:3000
#
# What works in Docker: the no-login analyze flow (upload .dem -> scan roster ->
# scoreboard -> pick player -> highlights/match view). What does NOT: gameplay
# CAPTURE (HLAE + CS2) is a Windows + GPU stage and cannot run in a Linux
# container, so the sidebar "Capture" card correctly reads "Set up capture" and a
# created reel surfaces a clear "recording is not configured" failure. Capture
# (and rendering captured footage) still needs a host orchestrator with
# ZV_RECORDER_PATH / ZV_HLAE_PATH / ZV_CS2_PATH set.
services:
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ZV_DATABASE_URL: memory
      ZV_HTTP_ADDR: 0.0.0.0:8080
      ZV_DATA_DIR: /data
      # A non-loopback bind requires a mutation token; the web container sends the
      # same value, and the proxy now carries it on reads too.
      ZV_MUTATION_TOKEN: ${ZV_MUTATION_TOKEN:-fragforge-local}
    volumes:
      - appdata:/data
    ports:
      - "127.0.0.1:8080:8080" # loopback-only, handy for `curl /api/capabilities`
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      ORCHESTRATOR_URL: http://orchestrator:8080
      ORCHESTRATOR_TOKEN: ${ZV_MUTATION_TOKEN:-fragforge-local}
      # Server route handlers read the mode at runtime (the client bundle gets
      # it baked at build time in web/Dockerfile); both must say "local" for
      # the no-login analyze flow to proxy to the orchestrator container.
      NEXT_PUBLIC_FRAGFORGE_MODE: local
      # When set, web/middleware.ts requires HTTP Basic Auth with this password
      # on every route. Empty (the default) leaves the UI open, matching the
      # previous behavior for a loopback-only local stack.
      FRAGFORGE_WEB_PASSWORD: ${FRAGFORGE_WEB_PASSWORD:-}
    ports:
      - "3000:3000"
    depends_on:
      - orchestrator
    restart: unless-stopped

volumes:
  appdata:
