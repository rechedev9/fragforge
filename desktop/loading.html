<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>FragForge Studio</title>
    <style>
      html, body { height: 100%; margin: 0; }
      body {
        display: flex; align-items: center; justify-content: center;
        background: #0a0a0a; color: #ededed;
        font: 15px/1.5 system-ui, -apple-system, Segoe UI, sans-serif;
      }
      .box { text-align: center; }
      .spinner {
        width: 34px; height: 34px; margin: 0 auto 1rem;
        border: 3px solid #262626; border-top-color: #ededed; border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .muted { color: #8f8f8f; margin-top: .4rem; }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="spinner"></div>
      <div>Arrancando FragForge Studio</div>
      <div class="muted">orquestador + captura local (HLAE/CS2)</div>
    </div>
  </body>
</html>
