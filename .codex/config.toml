#:schema https://developers.openai.com/codex/config-schema.json

[mcp_servers.fragforge]
# This path is intentionally relative to the repository root. Start Codex
# there (for example, `codex --cd C:\Users\reche\Documents\zackvideo`).
command = "node"
args = ["--no-warnings", "--experimental-strip-types", "desktop/src/mcp/stdio.ts"]
cwd = "."
startup_timeout_sec = 10
tool_timeout_sec = 900
default_tools_approval_mode = "writes"
