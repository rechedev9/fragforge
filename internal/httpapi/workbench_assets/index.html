<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FragForge Workbench</title>
  <style>{{WORKBENCH_CSS}}</style>
  <script>{{WORKBENCH_HTMX}}</script>
</head>
<body hx-headers='js:{"X-FragForge-Token": document.getElementById("token")?.value || ""}'>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">FF</span>
      <div>
        <h1>FragForge Workbench</h1>
        <p>Local CS2 demo-to-video workbench</p>
      </div>
    </div>
    <div class="top-status" aria-label="System status">
      <span class="chip">Env: localhost</span>
      <span class="chip good">UI: HTMX</span>
      <span class="chip">Workers: parser / record / render</span>
    </div>
    <div class="top-actions">
      <input id="token" name="token" type="password" placeholder="Mutation token" autocomplete="off">
      <button
        type="button"
        class="button secondary"
        hx-get="/ui/jobs"
        hx-target="#jobs"
        hx-include="#selected-job-id">
        Refresh
      </button>
      <span class="health-text" role="status">ready</span>
    </div>
  </header>

  <main class="workbench-shell">
    <aside class="left-rail" aria-label="Intake and runs">
      <section class="rail-section">
        <div class="section-head">
          <h2>Intake</h2>
          <span class="meta-label">Step 1</span>
        </div>
        <form
          hx-post="/ui/jobs"
          hx-encoding="multipart/form-data"
          hx-target="#workspace"
          hx-indicator="#upload-indicator"
          class="stack">
          <label class="drop-zone" for="demo-file">
            <input id="demo-file" name="demo" type="file" accept=".dem" required>
            <span class="drop-title">Select CS2 .dem</span>
            <span class="drop-meta">Roster scan starts automatically when SteamID64 is empty</span>
          </label>
          <label class="field">
            <span>Target SteamID64</span>
            <input name="target_steamid" inputmode="numeric" autocomplete="off" placeholder="leave empty to choose from roster">
          </label>
          <button type="submit" class="button primary full">Start New Run</button>
          <span id="upload-indicator" class="htmx-indicator meta-label">Uploading</span>
        </form>
      </section>

      <section class="rail-section rail-fill">
        <div class="section-head">
          <h2>Run Queue</h2>
          <span class="meta-label">Live</span>
        </div>
        <input id="selected-job-id" type="hidden" name="selected" value="">
        <div
          id="jobs"
          class="run-list"
          hx-get="/ui/jobs"
          hx-trigger="load, every 3s"
          hx-include="#selected-job-id"
          hx-swap="innerHTML">
          <div class="empty-state">Loading jobs.</div>
        </div>
      </section>
    </aside>

    <section
      id="workspace"
      class="workspace"
      aria-label="Production workspace"
      hx-get="/ui/workspace"
      hx-trigger="load"
      hx-swap="innerHTML">
      <div class="workspace-status">
        <span class="chip">Loading workspace</span>
      </div>
    </section>
  </main>
</body>
</html>
