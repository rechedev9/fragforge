name: CI

permissions:
  contents: read

env:
  CI: true
  PNPM_VERSION: 11.9.0

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go gate (windows)
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: go-gate (vet, build, test, zv check)
        shell: bash
        run: scripts/go-gate.sh --no-format --no-staticcheck --build

  desktop:
    name: desktop (lint, typecheck, unit, build)
    runs-on: windows-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34 # v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck
      # Real-process and packaged-artifact E2Es are explicitly environment-gated
      # and run only through their dedicated commands.
      - run: pnpm run test:unit
      - run: pnpm run build

  changes:
    name: Detect installer changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      installer_changed: ${{ steps.installer-changes.outputs.changed }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect installer-relevant changes
        id: installer-changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" != "push" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! git cat-file -e "$BEFORE_SHA^{commit}" 2>/dev/null; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --quiet "$BEFORE_SHA" "$HEAD_SHA" -- \
            .github/workflows/ci.yml desktop web scripts/build.ps1 \
            cmd/zv-orchestrator cmd/zv-editor cmd/zv-recorder internal \
            effects overlays data/music/catalog.json go.mod go.sum; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  installer-windows:
    name: desktop installer (windows-latest)
    needs: changes
    if: needs.changes.outputs.installer_changed == 'true'
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34 # v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: |
            desktop/pnpm-lock.yaml
            web/pnpm-lock.yaml

      - name: Install web dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Install desktop dependencies
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      - name: Build bundled Go binaries
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          go build -o bin/zv-orchestrator.exe ./cmd/zv-orchestrator
          go build -o bin/zv-editor.exe ./cmd/zv-editor
          go build -o bin/zv-recorder.exe ./cmd/zv-recorder

      - name: Create CI-only local music placeholders
        shell: pwsh
        run: |
          $catalog = Get-Content data/music/catalog.json -Raw | ConvertFrom-Json
          foreach ($track in $catalog.tracks) {
            if ($track.downloadUrl -or -not $track.id -or -not $track.ext) { continue }
            $path = Join-Path data/music "$($track.id).$($track.ext)"
            [IO.File]::WriteAllBytes($path, [Text.Encoding]::ASCII.GetBytes("ID3"))
          }

      - name: Build and verify Windows installer
        working-directory: desktop
        run: pnpm run dist

      - name: Verify installer checksums in a fresh process
        working-directory: desktop
        run: pnpm run verify:dist-integrity
