name: CI

permissions:
  contents: read

env:
  CI: true
  PNPM_VERSION: 11.9.0

on:
  push:
    branches: [main]
  schedule:
    - cron: '17 3 * * 0'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-integrity:
    name: Repo integrity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      installer_changed: ${{ steps.installer-changes.outputs.changed }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect installer-relevant changes
        id: installer-changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" != "push" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! git cat-file -e "$BEFORE_SHA^{commit}" 2>/dev/null; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --quiet "$BEFORE_SHA" "$HEAD_SHA" -- \
            .github/workflows/ci.yml desktop web scripts/build.ps1 \
            cmd/zv-orchestrator cmd/zv-editor cmd/zv-recorder internal \
            effects overlays data/music/catalog.json go.mod go.sum; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: AGENTS.md must be a symlink to CLAUDE.md
        run: |
          if [ ! -L AGENTS.md ] || [ "$(readlink AGENTS.md)" != "CLAUDE.md" ]; then
            echo "AGENTS.md must be a symbolic link to CLAUDE.md (see .githooks/pre-commit)" >&2
            exit 1
          fi

      - name: No generated media or binaries tracked in git
        run: |
          pattern='\.(exe|dem|mp4|mov|webm|avi|mkv|wav|flac|aac|tga|exr|y4m|yuv)$'
          hits="$(git ls-files | grep -Ei "$pattern" || true)"
          if [ -n "$hits" ]; then
            echo "generated media/binary files must never be committed (see .gitignore):" >&2
            echo "$hits" >&2
            exit 1
          fi

      - name: Shell script syntax
        shell: bash
        run: |
          while IFS= read -r script; do
            bash -n "$script"
          done < <(git ls-files '*.sh' '.githooks/*')

  go:
    name: Go gate (ubuntu)
    needs: repo-integrity
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache Go quality tools
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/go/bin
          key: ${{ runner.os }}-go-tools-${{ hashFiles('go.mod') }}-staticcheck2025.1.1-govulncheck1.4.0

      - name: Install staticcheck
        shell: bash
        run: command -v staticcheck >/dev/null || go install honnef.co/go/tools/cmd/staticcheck@2025.1.1

      - name: Install govulncheck
        shell: bash
        run: command -v govulncheck >/dev/null || go install golang.org/x/vuln/cmd/govulncheck@v1.4.0

      - name: Validate GitHub Actions workflows
        shell: bash
        run: bash scripts/ci-check.sh

      - name: go-gate (fmt, vet, build, test, zv check, staticcheck)
        shell: bash
        run: scripts/go-gate.sh --build

      - name: govulncheck
        shell: bash
        run: govulncheck ./...

  web:
    name: web (lint, typecheck, unit, build)
    needs: repo-integrity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34 # v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --prod --audit-level high
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run test:unit
      - run: pnpm run build

  desktop:
    name: desktop (lint, typecheck, unit, build)
    needs: repo-integrity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34 # v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --prod --audit-level high
      - run: pnpm run lint
      - run: pnpm run typecheck
      # Real-process and packaged-artifact E2Es are explicitly environment-gated
      # and run only through their dedicated commands.
      - run: pnpm run test:unit
      - run: pnpm run build

  landing:
    name: landing (build)
    needs: repo-integrity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: landing
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34 # v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: landing/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --prod --audit-level high
      - run: pnpm run build

  installer-windows:
    name: desktop installer (windows-latest)
    needs: repo-integrity
    if: needs.repo-integrity.outputs.installer_changed == 'true'
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34 # v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: |
            desktop/pnpm-lock.yaml
            web/pnpm-lock.yaml

      - name: Install web dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Install desktop dependencies
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      - name: Build bundled Go binaries
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          go build -o bin/zv-orchestrator.exe ./cmd/zv-orchestrator
          go build -o bin/zv-editor.exe ./cmd/zv-editor
          go build -o bin/zv-recorder.exe ./cmd/zv-recorder

      - name: Create CI-only local music placeholders
        shell: pwsh
        run: |
          $catalog = Get-Content data/music/catalog.json -Raw | ConvertFrom-Json
          foreach ($track in $catalog.tracks) {
            if ($track.downloadUrl -or -not $track.id -or -not $track.ext) { continue }
            $path = Join-Path data/music "$($track.id).$($track.ext)"
            [IO.File]::WriteAllBytes($path, [Text.Encoding]::ASCII.GetBytes("ID3"))
          }

      - name: Build and verify Windows installer
        working-directory: desktop
        run: pnpm run dist

      - name: Verify installer checksums in a fresh process
        working-directory: desktop
        run: pnpm run verify:dist-integrity
