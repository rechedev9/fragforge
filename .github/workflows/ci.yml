name: CI

permissions:
  contents: read

env:
  CI: true
  PNPM_VERSION: 11.9.0

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    name: security (vulnerabilities and secrets)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Go vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.4.0 ./...

      - name: Go security scan
        # These rule families have project-wide, audited false positives (for
        # example fixed-argv subprocesses and paths validated at their owning
        # boundary). Keep the remaining gosec rules as a blocking CI gate.
        run: >-
          go run github.com/securego/gosec/v2/cmd/gosec@v2.28.0
          -exclude=G101,G103,G104,G115,G118,G120,G204,G301,G302,G304,G602,G702,G703
          ./cmd/... ./internal/...

      - name: Secret scan
        run: go run github.com/zricethezav/gitleaks/v8@v8.30.0 detect --source . --no-git --redact --no-banner

  go:
    name: Go gate (windows)
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: go-gate (vet, build, test, zv check)
        shell: bash
        run: scripts/go-gate.sh --no-format --no-staticcheck --build

  desktop:
    name: desktop (lint, typecheck, unit, build)
    runs-on: windows-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34 # v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck
      # Real-process and packaged-artifact E2Es are explicitly environment-gated
      # and run only through their dedicated commands.
      - run: pnpm run test:unit
      - run: pnpm run build
      - run: pnpm audit --prod --audit-level=high

  web:
    name: web (lint, typecheck, unit, build, audit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34 # v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run test:unit
      - run: pnpm run build
      - run: pnpm audit --prod --audit-level=high

  landing:
    name: landing (build and audit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: landing
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34 # v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: landing/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm audit --prod --audit-level=high

  changes:
    name: Detect installer changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      installer_changed: ${{ steps.installer-changes.outputs.changed }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect installer-relevant changes
        id: installer-changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" != "push" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! git cat-file -e "$BEFORE_SHA^{commit}" 2>/dev/null; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --quiet "$BEFORE_SHA" "$HEAD_SHA" -- \
            .github/workflows/ci.yml desktop web scripts/build.ps1 \
            cmd/zv-orchestrator cmd/zv-editor cmd/zv-recorder internal \
            effects overlays data/music/catalog.json go.mod go.sum; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  installer-windows:
    name: desktop installer (windows-latest)
    needs: changes
    # Pull requests and pushes exercise lint/typecheck/unit/build above. Signed
    # packaging is an explicit release operation: a trusted manual run supplies
    # the protected signing identity, and dist fails closed if any part is absent.
    if: needs.changes.outputs.installer_changed == 'true' && github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34 # v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: |
            desktop/pnpm-lock.yaml
            web/pnpm-lock.yaml

      - name: Install web dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Install desktop dependencies
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      - name: Build bundled Go binaries
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          go build -o bin/zv-orchestrator.exe ./cmd/zv-orchestrator
          go build -o bin/zv-editor.exe ./cmd/zv-editor
          go build -o bin/zv-recorder.exe ./cmd/zv-recorder

      - name: Create CI-only local music placeholders
        shell: pwsh
        run: |
          $catalog = Get-Content data/music/catalog.json -Raw | ConvertFrom-Json
          foreach ($track in $catalog.tracks) {
            if ($track.downloadUrl -or -not $track.id -or -not $track.ext) { continue }
            $path = Join-Path data/music "$($track.id).$($track.ext)"
            [IO.File]::WriteAllBytes($path, [Text.Encoding]::ASCII.GetBytes("ID3"))
          }

      - name: Build and verify Windows installer
        working-directory: desktop
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          FRAGFORGE_AUTHENTICODE_SUBJECT: ${{ vars.FRAGFORGE_AUTHENTICODE_SUBJECT }}
        run: pnpm run dist

      - name: Verify installer checksums in a fresh process
        working-directory: desktop
        env:
          FRAGFORGE_AUTHENTICODE_SUBJECT: ${{ vars.FRAGFORGE_AUTHENTICODE_SUBJECT }}
        run: pnpm run verify:dist-integrity
