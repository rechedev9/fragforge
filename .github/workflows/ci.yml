name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_windows_gate:
        description: Also run the windows-latest Go gate on this ref
        type: boolean
        default: true

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-integrity:
    name: Repo integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: AGENTS.md must be a symlink to CLAUDE.md
        run: |
          if [ ! -L AGENTS.md ] || [ "$(readlink AGENTS.md)" != "CLAUDE.md" ]; then
            echo "AGENTS.md must be a symbolic link to CLAUDE.md (see .githooks/pre-commit)" >&2
            exit 1
          fi

      - name: No generated media or binaries tracked in git
        run: |
          pattern='\.(exe|dem|mp4|mov|webm|avi|mkv|wav|flac|aac|tga|exr|y4m|yuv)$'
          hits="$(git ls-files | grep -Ei "$pattern" || true)"
          if [ -n "$hits" ]; then
            echo "generated media/binary files must never be committed (see .gitignore):" >&2
            echo "$hits" >&2
            exit 1
          fi

  go:
    name: Go gate (ubuntu, every push)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache staticcheck/govulncheck binaries
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: ${{ runner.os }}-go-tools-staticcheck2025.1.1-govulncheck1.4.0

      - name: Install staticcheck and govulncheck
        shell: bash
        run: |
          command -v staticcheck >/dev/null || go install honnef.co/go/tools/cmd/staticcheck@2025.1.1
          command -v govulncheck >/dev/null || go install golang.org/x/vuln/cmd/govulncheck@v1.4.0

      - name: go-gate (fmt, vet, build, test, zv check, staticcheck)
        shell: bash
        run: scripts/go-gate.sh --build

      - name: govulncheck (informational)
        shell: bash
        continue-on-error: true
        run: govulncheck ./...

  go-windows:
    name: Go gate (windows-latest fidelity)
    # Full Windows-fidelity re-run: automatic on every push to main (the safety
    # net after landing), plus on-demand via workflow_dispatch for verifying
    # this job itself on a branch without waiting for a main push.
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event.inputs.run_windows_gate == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache staticcheck/govulncheck binaries
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: ${{ runner.os }}-go-tools-staticcheck2025.1.1-govulncheck1.4.0

      - name: Install staticcheck and govulncheck
        shell: bash
        run: |
          command -v staticcheck >/dev/null || go install honnef.co/go/tools/cmd/staticcheck@2025.1.1
          command -v govulncheck >/dev/null || go install golang.org/x/vuln/cmd/govulncheck@v1.4.0

      - name: go-gate (fmt, vet, build, test, zv check, staticcheck)
        shell: bash
        run: scripts/go-gate.sh --build

      - name: govulncheck (informational)
        shell: bash
        continue-on-error: true
        run: govulncheck ./...

  web:
    name: web (lint, typecheck, unit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:unit

  desktop:
    name: desktop (lint, typecheck, unit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      # No Go binaries are built in this job, so bin/zv-orchestrator.exe never
      # exists and the MCP e2e specs matched by this glob stay self-skipped.
      - run: npm run test:unit

  landing:
    name: landing (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: landing/package-lock.json

      - run: npm ci
      - run: npm run build
