<!doctype html>
<html lang="en" data-resolution="portrait">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      @font-face {
        font-family: "ZVNumber";
        src: url("./assets/fonts/bahnschrift.ttf") format("truetype");
        font-weight: 700;
        font-style: normal;
      }
      html,
      body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: transparent;
        font-family: "ZVNumber", sans-serif;
      }
      .kill-number {
        position: absolute;
        left: 50%;
        top: 1518px;
        transform: translate(-50%, -50%) scale(0.96);
        color: rgba(244, 241, 234, 0);
        font-size: 46px;
        font-weight: 700;
        line-height: 1;
        text-align: center;
        text-shadow:
          0 1px 2px rgba(0, 0, 0, 0.85),
          0 0 10px rgba(0, 0, 0, 0.35);
        will-change: transform, opacity;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="33.6"
      data-width="1080"
      data-height="1920"
    >
      <div id="kill-1" class="kill-number">1</div>
      <div id="kill-2" class="kill-number">2</div>
      <div id="kill-3" class="kill-number">3</div>
      <div id="kill-4" class="kill-number">4</div>
      <div id="kill-5" class="kill-number">5</div>
      <div id="kill-6" class="kill-number">6</div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      const killTimes = [1.0, 7.0, 12.98, 16.41, 22.4, 28.39];
      killTimes.forEach((time, index) => {
        const selector = `#kill-${index + 1}`;
        tl.fromTo(
          selector,
          { opacity: 0, scale: 0.96, y: 8 },
          { opacity: 0.92, scale: 1.08, y: 0, duration: 0.11, ease: "power2.out" },
          time
        );
        tl.to(
          selector,
          { opacity: 0.9, scale: 1.0, y: 0, duration: 0.22, ease: "power1.out" },
          time + 0.11
        );
        tl.to(
          selector,
          { opacity: 0, scale: 0.98, y: -4, duration: 0.29, ease: "power2.in" },
          time + 0.33
        );
      });
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
