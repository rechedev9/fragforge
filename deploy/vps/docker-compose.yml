# FragForge Cloud control-plane on the Hetzner VPS (gr-prod).
#
# This runs only the web (Next.js) app in cloud mode. There is no
# orchestrator here: the VPS is control plane only (identity, pairing, agent
# liveness); every byte of media stays on the paired agent's PC. See
# docs/superpowers/specs/2026-07-08-local-first-cloud-data-plane.md.
#
# The VPS's existing reverse proxy / Tailscale setup fronts this container;
# no nginx is added here. Port 3000 is bound to loopback only.
#
#   cd deploy/vps
#   docker compose up -d --build
#
# See README.md in this directory for the env file setup and pairing flow.
services:
  web:
    build:
      context: ../../web
      dockerfile: Dockerfile
      args:
        FRAGFORGE_MODE: cloud
    env_file:
      - .env
    environment:
      # Runtime value for the server route handlers; the client bundle got
      # its copy at build time via the FRAGFORGE_MODE build arg above.
      NEXT_PUBLIC_FRAGFORGE_MODE: cloud
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
