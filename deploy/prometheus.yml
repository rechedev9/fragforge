# Local Prometheus scrape config for FragForge.
# The orchestrator (zv serve) exposes /metrics on 127.0.0.1:8080; from inside
# the Prometheus container the host is reached via host.docker.internal.
#
# Start it with: docker compose --profile observability up -d
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: fragforge
    static_configs:
      - targets: ["host.docker.internal:8080"]
