services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zackvideo
      POSTGRES_PASSWORD: zackvideo
      POSTGRES_DB: zackvideo
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zackvideo"]
      interval: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
  # Optional local Prometheus that scrapes the orchestrator's /metrics endpoint.
  # Opt in with: docker compose --profile observability up -d
  # Then open http://localhost:9090 and query fragforge_errors_total.
  prometheus:
    image: prom/prometheus:latest
    profiles: ["observability"]
    ports: ["9090:9090"]
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
volumes:
  pgdata:
